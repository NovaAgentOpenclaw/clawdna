name: Verify ClawDNA on Solana Devnet

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  SOLANA_VERSION: 1.18.0
  ANCHOR_VERSION: 0.29.0

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Solana CLI
      run: |
        curl -L -o solana.tar.bz2 "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
        tar -xjf solana.tar.bz2
        mv solana-release/bin/* /usr/local/bin/
        solana --version

    - name: Install Anchor CLI
      run: |
        npm install -g @coral-xyz/anchor-cli@${ANCHOR_VERSION}
        anchor --version

    - name: Configure Solana
      run: |
        solana config set --url devnet
        solana config get

    - name: Debug directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Files in current dir ==="
        ls -la
        echo "=== Looking for Anchor.toml ==="
        find . -name "Anchor.toml" -type f
        echo "=== Looking for Cargo.toml ==="
        find . -name "Cargo.toml" -type f

    - name: Verify deployed program
      run: |
        PROGRAM_ID=$(cat clawdna/DEPLOYED_PROGRAM_ID.txt)
        echo "Checking program: $PROGRAM_ID"
        solana program show "$PROGRAM_ID" || echo "⚠️ Program may not be deployed yet"

    - name: Build program
      run: |
        cargo fetch
        anchor build

    - name: Generate IDL
      run: |
        anchor idl build -o target/idl/clawdna.json || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          target/deploy/clawdna.so
          target/idl/clawdna.json
          target/types/clawdna.ts
          clawdna/DEPLOYED_PROGRAM_ID.txt

    - name: Show verification info
      run: |
        echo "========================================"
        echo "✅ ClawDNA Verification Complete!"
        echo "========================================"
        echo "Program ID: $(cat clawdna/DEPLOYED_PROGRAM_ID.txt)"
        echo "Explorer: https://explorer.solana.com/address/$(cat clawdna/DEPLOYED_PROGRAM_ID.txt)?cluster=devnet"
        echo "========================================"
