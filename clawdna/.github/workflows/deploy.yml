name: Deploy ClawDNA to Devnet

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install Solana CLI
      run: |
        sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        solana --version
        
    - name: Install Anchor CLI
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        cargo install --git https://github.com/coral-xyz/anchor --tag v0.29.0 anchor-cli --locked
        anchor --version
        
    - name: Configure Solana
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        solana config set --url devnet
        solana-keygen new --no-passphrase --silent --outfile ~/.config/solana/id.json
        echo "PublicKey: $(solana address)"
        
    - name: Request Airdrop
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        solana airdrop 2 || echo "Airdrop falhou, tentando novamente..."
        sleep 5
        solana airdrop 2 || true
        solana balance
        
    - name: Build Program
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        anchor build
        
    - name: Deploy to Devnet
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        anchor deploy --provider.cluster devnet 2>&1 | tee deploy_output.txt
        
    - name: Extract Program ID
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        PROGRAM_ID=$(grep -oP 'Program Id: \K[0-9A-Za-z]+' deploy_output.txt)
        echo "Program ID: $PROGRAM_ID"
        echo "$PROGRAM_ID" > DEPLOYED_PROGRAM_ID.txt
        
        # Atualizar lib.rs
        if [ -n "$PROGRAM_ID" ]; then
          sed -i "s/declare_id!(\"[^\"]*\")/declare_id!(\"$PROGRAM_ID\")/" programs/clawdna/src/lib.rs
          echo "✅ declare_id! atualizado"
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: deploy-artifacts
        path: |
          DEPLOYED_PROGRAM_ID.txt
          deploy_output.txt
          
    - name: Commit Program ID
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add DEPLOYED_PROGRAM_ID.txt programs/clawdna/src/lib.rs
        git diff --staged --quiet || (git commit -m "Deploy: Update Program ID [skip ci]" && git push)
      continue-on-error: true
