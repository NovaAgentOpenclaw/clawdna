<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawDNA ELITE - Advanced Agent Evolution Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, transparent 0%, rgba(102, 126, 234, 0.03) 1%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.8;
            font-weight: 300;
        }
        
        /* Subagents Grid */
        .subagents-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-icon {
            font-size: 1.5em;
        }
        
        .subagents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .subagent {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: move;
        }
        
        .subagent:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .subagent.dragging {
            opacity: 0.7;
            transform: scale(1.05);
        }
        
        .agent-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .agent-info {
            text-align: center;
        }
        
        .agent-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .agent-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 10px;
        }
        
        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .fitness-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .fitness-fill {
            height: 100%;
            transition: width 1s ease;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chart-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }
        
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }
        
        button:active {
            transform: translateY(0) scale(0.98);
        }
        
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        button:disabled::before {
            animation: none;
        }
        
        /* Leaderboard */
        .leaderboard {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
        }
        
        .leaderboard-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 1fr 80px;
            gap: 15px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            align-items: center;
        }
        
        .leaderboard-row.header {
            background: rgba(102, 126, 234, 0.3);
            font-weight: bold;
        }
        
        .rank {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        /* Breeding Animation */
        .breeding-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        
        .breeding-animation.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .breeding-particles {
            position: absolute;
            width: 200px;
            height: 200px;
        }
        
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.6));
            border-radius: 50%;
            animation: merge 1s ease-in-out forwards;
        }
        
        @keyframes merge {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .breeding-result {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
            animation: appear 0.5s ease-out 1s forwards;
        }
        
        @keyframes appear {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1.2); }
        }
        
        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            z-index: 2000;
            backdrop-filter: blur(20px);
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧬 ClawDNA ELITE</h1>
            <div class="subtitle">Advanced Multi-Agent Evolution Platform</div>
        </header>
        
        <!-- Controls -->
        <div class="controls">
            <button onclick="initSubagents()" id="initBtn">Initialize Agents</button>
            <button onclick="evolveOnce()" id="evolveBtn" disabled>Evolve</button>
            <button onclick="autoEvolve()" id="autoBtn" disabled>Auto Evolve (10x)</button>
        </div>
        
        <!-- Subagents -->
        <div class="subagents-section">
            <div class="section-title">
                <span class="section-icon">🤖</span>
                Subagents (8 Agents)
            </div>
            <div class="subagents-grid" id="subagentsGrid"></div>
        </div>
        
        <!-- Dashboard -->
        <div class="dashboard">
            <div class="chart-container">
                <div class="chart-title">📊 Fitness Evolution</div>
                <canvas id="fitnessChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">🏆 Leaderboard</div>
                <div id="leaderboard"></div>
            </div>
        </div>
        
        <!-- Breeding Animation Overlay -->
        <div class="breeding-animation" id="breedingOverlay">
            <div class="breeding-particles" id="breedingParticles"></div>
            <div class="breeding-result" id="breedingResult">🧬</div>
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Evolving...</div>
        </div>
    </div>
    
    <script>
        let fitnessChart;
        let draggedAgent = null;
        let subagentsData = [];
        
        // Initialize chart
        const fitnessCtx = document.getElementById('fitnessChart').getContext('2d');
        fitnessChart = new Chart(fitnessCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Average Fitness',
                    data: [],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    fill: true,
                    tension: 0.4
                }, {
                    label: 'Max Fitness',
                    data: [],
                    borderColor: '#f093fb',
                    backgroundColor: 'rgba(240, 147, 251, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: 'white', font: { size: 14 } }
                    },
                    annotation: {
                        annotations: {
                            point1: { type: 'box', backgroundColor: 'rgba(240, 147, 251, 0.2)' }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 12 } },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    y: {
                        ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 12 } },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    }
                }
            }
        });
        
        async function initSubagents() {
            const response = await fetch('/api/init');
            const data = await response.json();
            
            if (data.success) {
                await loadStatus();
            }
        }
        
        async function loadStatus() {
            const response = await fetch('/api/status');
            const data = await response.json();
            
            subagentsData = data.subagents;
            renderSubagents();
            updateChart(data.history);
            renderLeaderboard(data.best_agents);
            
            document.getElementById('evolveBtn').disabled = false;
            document.getElementById('autoBtn').disabled = false;
        }
        
        async function evolveOnce() {
            showLoading();
            const response = await fetch('/api/evolve');
            const data = await response.json();
            
            if (data.success) {
                await loadStatus();
                hideLoading();
            }
        }
        
        async function autoEvolve() {
            showLoading();
            
            for (let i = 0; i < 10; i++) {
                await evolveOnce();
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            hideLoading();
        }
        
        function renderSubagents() {
            const grid = document.getElementById('subagentsGrid');
            grid.innerHTML = '';
            
            subagentsData.forEach((agent, index) => {
                const subagentEl = document.createElement('div');
                subagentEl.className = 'subagent';
                subagentEl.draggable = true;
                subagentEl.dataset.id = agent.id;
                
                const fitnessPercent = (agent.fitness / 5) * 100;
                
                subagentEl.innerHTML = `
                    <div class="agent-avatar" style="background: ${agent.style.bg}; animation-delay: ${index * 0.3}s;">
                        ${agent.style.emoji}
                    </div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.style.name}</div>
                        <div class="agent-stats">
                            <div class="stat">
                                <div class="stat-label">Generation</div>
                                <div class="stat-value">${agent.generation}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Fitness</div>
                                <div class="stat-value">${agent.fitness.toFixed(2)}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Breeds</div>
                                <div class="stat-value">${agent.total_breedings}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Offspring</div>
                                <div class="stat-value">${agent.offspring_count}</div>
                            </div>
                        </div>
                        <div class="fitness-bar">
                            <div class="fitness-fill" style="width: ${fitnessPercent}%"></div>
                        </div>
                    </div>
                `;
                
                subagentEl.addEventListener('dragstart', handleDragStart);
                subagentEl.addEventListener('dragend', handleDragEnd);
                subagentEl.addEventListener('dragover', handleDragOver);
                subagentEl.addEventListener('drop', handleDrop);
                
                grid.appendChild(subagentEl);
            });
        }
        
        function updateChart(history) {
            const labels = history.avg_fitness.map((_, i) => `Gen ${i + 1}`);
            
            fitnessChart.data.labels = labels;
            fitnessChart.data.datasets[0].data = history.avg_fitness;
            fitnessChart.data.datasets[1].data = history.max_fitness;
            fitnessChart.update();
        }
        
        function renderLeaderboard(bestAgents) {
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';
            
            const header = document.createElement('div');
            header.className = 'leaderboard-row header';
            header.innerHTML = `
                <div class="rank">#</div>
                <div>Agent</div>
                <div>Fitness</div>
                <div>Generation</div>
                <div>Time</div>
            `;
            leaderboard.appendChild(header);
            
            bestAgents.slice(0, 10).reverse().forEach((data, index) => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row';
                row.innerHTML = `
                    <div class="rank rank-${index + 1}">${index + 1}</div>
                    <div>${data.best_agent_style}</div>
                    <div>${data.best_fitness.toFixed(2)}</div>
                    <div>${data.generation}</div>
                    <div>${data.timestamp}</div>
                `;
                leaderboard.appendChild(row);
            });
        }
        
        function handleDragStart(e) {
            draggedAgent = e.target.closest('.subagent');
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
        }
        
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }
        
        function handleDragOver(e) {
            e.preventDefault();
        }
        
        function handleDrop(e) {
            e.preventDefault();
            const targetAgent = e.target.closest('.subagent');
            const sourceId = parseInt(e.dataTransfer.getData('text/plain'));
            
            if (targetAgent && targetAgent.dataset.id != sourceId) {
                // Show breeding animation
                showBreedingAnimation(sourceId, targetAgent.dataset.id);
            }
        }
        
        function showBreedingAnimation(agent1Id, agent2Id) {
            const overlay = document.getElementById('breedingOverlay');
            const particles = document.getElementById('breedingParticles');
            const result = document.getElementById('breedingResult');
            
            overlay.classList.add('active');
            
            // Create particles
            particles.innerHTML = '';
            const agent1 = subagentsData.find(a => a.id === agent1Id);
            const agent2 = subagentsData.find(a => a.id === agent2Id);
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${Math.random() * 100 + 50}px`;
                particle.style.top = `${Math.random() * 100 + 50}px`;
                particle.style.animationDelay = `${Math.random()}s`;
                particles.appendChild(particle);
            }
            
            // Show result
            result.innerHTML = '🧬';
            
            // Hide animation after 2s
            setTimeout(() => {
                overlay.classList.remove('active');
            }, 2000);
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
    </script>
</body>
</html>
