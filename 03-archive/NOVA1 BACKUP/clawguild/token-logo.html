<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  width: 512px;
  height: 512px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.logo-container {
  position: relative;
  width: 400px;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.outer-ring {
  position: absolute;
  width: 380px;
  height: 380px;
  border: 8px solid rgba(233, 69, 96, 0.3);
  border-radius: 50%;
  animation: rotate 20s linear infinite;
}
.outer-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 4px solid transparent;
  border-top-color: #e94560;
  border-right-color: #ff6b6b;
  animation: rotate 15s linear infinite reverse;
}
.inner-ring {
  position: absolute;
  width: 320px;
  height: 320px;
  border: 4px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
}
.core {
  position: absolute;
  width: 280px;
  height: 280px;
  background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(15, 15, 30, 0.8));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
  border: 2px solid rgba(233, 69, 96, 0.5);
  box-shadow: 
    0 0 60px rgba(233, 69, 96, 0.4),
    inset 0 0 60px rgba(233, 69, 96, 0.1);
}
.lobster {
  font-size: 140px;
  filter: drop-shadow(0 0 20px rgba(233, 69, 96, 0.8));
  animation: pulse 2s ease-in-out infinite;
}
.token-symbol {
  position: absolute;
  bottom: 40px;
  font-size: 36px;
  font-weight: 900;
  color: #e94560;
  text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
  letter-spacing: 4px;
}
.glow-dots {
  position: absolute;
  width: 100%;
  height: 100%;
}
.dot {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #e94560;
  border-radius: 50%;
  box-shadow: 0 0 20px #e94560;
}
.dot:nth-child(1) { top: 20px; left: 50%; transform: translateX(-50%); }
.dot:nth-child(2) { bottom: 20px; left: 50%; transform: translateX(-50%); }
.dot:nth-child(3) { left: 20px; top: 50%; transform: translateY(-50%); }
.dot:nth-child(4) { right: 20px; top: 50%; transform: translateY(-50%); }

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
</style>
</head>
<body>
<div class="logo-container">
  <div class="outer-ring"></div>
  <div class="inner-ring"></div>
  <div class="glow-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="core">
    <div class="lobster">🦞</div>
  </div>
  <div class="token-symbol">$CLAWGUILD</div>
</div>
</body>
</html>
